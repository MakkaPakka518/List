name: 🌸 Update Yinghua Anime

on:
  schedule:
    # 每天北京时间 早上 8:45 和 晚上 20:45 自动更新
    # 巧妙错开其他三个脚本的运行时间，极速且不超载！
    - cron: '45 0,12 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装依赖库
        run: |
          python -m pip install --upgrade pip
          # 注意：因为樱花网站结构比较乱，加入了 beautifulsoup4 专门对付它
          pip install aiohttp beautifulsoup4

      - name: 🚀 运行樱花动漫抓取脚本
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python scripts/update_yinghua.py

      - name: 📤 提交并推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/yinghua-hot.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动更新樱花动漫热榜数据 🌸" && git push)
