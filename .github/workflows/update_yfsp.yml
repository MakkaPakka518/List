name: ⛵ Update YFSP Hot Video

on:
  schedule:
    # 每天北京时间 早上 8:55 和 晚上 20:55 自动更新
    # 完美卡在最后，不和豆瓣(00)、优酷(15)、芒果(30)、樱花(45)冲突！
    - cron: '55 0,12 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp beautifulsoup4

      - name: 🚀 运行爱壹帆抓取脚本
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python scripts/update_yfsp.py

      - name: 📤 提交并推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/yfsp-hot.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动更新爱壹帆热榜数据 ⛵" && git push)
