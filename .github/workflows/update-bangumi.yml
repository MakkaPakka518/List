name: 🌸 Update Bangumi Hot Anime

on:
  schedule:
    # 每天北京时间早上 9点 和 晚上 21点 自动更新
    - cron: '0 1,13 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # 防止官方弃用 Node.js 20 导致警告的修复代码
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp beautifulsoup4

      - name: 🚀 运行抓取脚本
        env:
          # 读取你在仓库 Secrets 中配好的 TMDB API Key
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python scripts/update_bangumi.py

      - name: 📤 提交并推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/bangumi-hot.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动更新 Bangumi 热榜动漫 🌸" && git push)
