name: 📈 Update Guduo Hot List

on:
  schedule:
    # 每天北京时间中午 14:00 自动更新 (UTC时间 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch: # 允许在 Actions 页面手动点击运行

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    # 防止官方弃用 Node.js 20 导致警告的修复代码
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装依赖库
        # 骨朵脚本只需要 aiohttp 即可，去掉了不需要的 beautifulsoup4
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: 🚀 运行抓取脚本
        env:
          # 读取你在仓库 Secrets 中配好的 TMDB API Key
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python scripts/update_guduo.py

      - name: 📤 提交并推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # 针对骨朵脚本生成的文件进行暂存
          git add data/guduo-hot.json
          # 如果有变化则提交并推送
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动更新骨朵热榜数据 📈" && git push)
