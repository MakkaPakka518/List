name: 🔄 Update Douban Hot TV

on:
  schedule:
    # 每天北京时间 早上 8:00 和 晚上 20:00 自动更新两次
    # cron 使用的是 UTC 时间 (北京时间减去 8 小时)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击运行

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: 🚀 运行抓取脚本
        env:
          # 从仓库 Secrets 中读取你的 TMDB API 密钥
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python scripts/update_douban.py

      - name: 📤 提交并推送到 GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/douban-hot.json
          # 如果文件有变动则提交，无变动则跳过不报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 自动更新豆瓣热榜数据 📈" && git push)
